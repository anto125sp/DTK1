<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>I miei biglietti</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            background-color: #ffffff; 
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overscroll-behavior-y: contain;
        }

        /* HEADER UNIVERSALE */
        .header {
            background-color: #26ba9d; color: white;
            padding: 0 16px; display: flex;
            justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000;
            height: 60px;
        }
        
        .header span { font-size: 22px; font-weight: 500; }
        .add-text-ios { display: none; } 

        /* CONFIGURAZIONE SPECIFICA IPHONE */
        @supports (-webkit-touch-callout: none) {
            .header {
                padding-top: env(safe-area-inset-top);
                height: calc(52px + env(safe-area-inset-top));
                justify-content: center;
            }
            /* Gestione Titolo iPhone */
            .header .title-text-android { display: none; }
            .header .title-text::after { content: "Biglietti"; }
            .header .title-text { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }

            /* Gestione Scritta Carica (Più piccola e sottile) */
            .header img { display: none; } 
            .add-text-ios { 
                display: block; 
                position: absolute; 
                right: 14px; 
                bottom: 14px; 
                font-size: 10px; /* Leggermente più piccola */
                font-weight: 200; /* Meno grossa */
                color: white;
                letter-spacing: -0.2px;
            }
            
            .ticket-list { margin-top: calc(52px + env(safe-area-inset-top)) !important; }
        }

        /* LISTA BIGLIETTI */
        .ticket-list { 
            width: 100%; padding: 0; 
            margin-top: 60px; 
            padding-bottom: 100px; 
        }

        .ticket-link { text-decoration: none; display: block; width: 100%; }

        .ticket-item {
            position: relative; width: 100%; height: 100px;
            background-color: #ffffff; 
            border: none;
            border-bottom: 1.1px solid #d0d0d0;
            overflow: hidden;
        }

        .turbo-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background-color: #a8e2d7; 
            animation: arstTurboFill 1.8s infinite linear;
            z-index: 1;
        }

        .ticket-content { position: absolute; top: 12px; left: 12px; z-index: 3; text-align: left; }
        .company-name { font-size: 14px; color: #8a8a8a; margin: 0; line-height: 1; font-weight: 400; }
        .ticket-info { font-size: 16px; color: #222; margin: 5px 0 0 0; line-height: 1.2; font-weight: 400; }

        .bus-container { position: absolute; bottom: 12px; left: 12px; z-index: 3; }
        .icon-bus-png { width: 22px; height: auto; display: block; }

        .status-text { 
            position: absolute; bottom: 12px; right: 12px; z-index: 4; 
            font-size: 14px; color: #555; font-weight: 400;
        }

        /* TOOLBAR */
        .footer-universal {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 65px; background-color: #26bb9d; 
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; overflow: hidden;
        }
        .footer-universal img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }

        @supports (-webkit-touch-callout: none) {
            .footer-universal {
                height: calc(52px + env(safe-area-inset-bottom));
                padding-bottom: env(safe-area-inset-bottom);
            }
        }

        @keyframes arstTurboFill {
            0% { width: 0%; opacity: 1; }
            15% { width: 100%; opacity: 1; }
            25% { width: 100%; opacity: 1; }
            30% { width: 100%; opacity: 0; }
            100% { width: 0%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="title-text-android">I miei biglietti</span>
        <span class="title-text"></span>
        <img src="src/add.webp" style="width:24px; opacity: 0.5;">
        <span class="add-text-ios">Carica</span>
    </div>

    <div class="ticket-list">
        <a href="extraurbano1.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">Abbonamento annuale studenti extraurbano</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>

        <a href="extraurbano2.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">Abbonamento annuale studenti extraurbano</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>

        <a href="urbano.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">Abbonamento annuale urbano</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>
    </div>

    <div class="footer-universal">
        <img src="toolbar.webp" alt="Toolbar">
    </div>

</body>
</html>
