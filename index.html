<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>I miei biglietti</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            background-color: #f2f2f2; 
            -webkit-user-select: none;
            font-family: -apple-system, sans-serif;
        }

        /* HEADER */
        .header {
            background-color: #26ba9d; color: white;
            padding: 15px 16px; display: flex;
            justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .header span {
            font-size: 22px; 
            font-weight: 500;
        }

        .ticket-list { 
            width: 100%; padding: 12px; 
            margin-top: 55px; padding-bottom: 85px; 
        }

        .ticket-link { text-decoration: none; display: block; width: 100%; margin-bottom: 10px; }

        .ticket-item {
            position: relative; width: 100%; height: 105px;
            background-color: #ffffff; border: 1px solid #e0e0e0; 
            border-radius: 4px; overflow: hidden;
        }

        .turbo-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background-color: #a8e2d7; 
            animation: arstTurboFill 1.8s infinite linear;
            z-index: 1;
        }

        .ticket-content { position: absolute; top: 10px; left: 12px; z-index: 3; text-align: left; }
        .company-name { font-size: 14px; color: #8a8a8a; margin: 0; line-height: 1; font-weight: 400; }
        .ticket-info { font-size: 15px; color: #444; margin: 2px 0 0 0; line-height: 1.2; font-weight: 400; text-transform: uppercase; }

        .bus-container { position: absolute; bottom: 10px; left: 12px; z-index: 3; }
        .icon-bus-png { width: 22px; height: auto; display: block; }

        .status-text { 
            position: absolute; bottom: 10px; right: 12px; z-index: 4; 
            font-size: 14px; 
            color: #555; 
            font-weight: 400;
        }

        /* FOOTER PIÙ SOTTILE CON ICONA NOME GIGANTE */
        .footer {
            position: fixed; bottom: 0; width: 100%; height: 65px; /* Altezza ridotta */
            background-color: #26ba9d; display: flex; justify-content: space-around; align-items: center;
            z-index: 2000;
        }
        .footer img { 
            width: 42px; 
            height: auto;
            opacity: 0.8; 
        }
        .footer .active { opacity: 1; width: 44px; }
        
        /* ICONA PROFILO MASSIMA: 75px */
        .footer .icon-profile {
            width: 75px; 
            margin-bottom: 5px; /* Leggermente alzata per centrarla bene */
        }

        @keyframes arstTurboFill {
            0% { width: 0%; opacity: 1; }
            15% { width: 100%; opacity: 1; }
            25% { width: 100%; opacity: 1; }
            30% { width: 100%; opacity: 0; }
            100% { width: 0%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span>I miei biglietti</span>
        <img src="src/add.webp" style="width:24px; opacity: 0.5;">
    </div>

    <div class="ticket-list">
        
        <a href="extraurbano1.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">ABBONAMENTO ANNUALE STUDENTI EXTRAURBANO</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>

        <a href="extraurbano2.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">ABBONAMENTO ANNUALE STUDENTI EXTRAURBANO</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>

        <a href="urbano.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="ticket-content">
                    <p class="company-name">ARST</p>
                    <p class="ticket-info">ABBONAMENTO ANNUALE URBANO</p>
                </div>
                <div class="bus-container"><img src="1000131418.webp" class="icon-bus-png"></div>
                <div class="status-text">176 giorni 23 ore</div>
            </div>
        </a>

    </div>

    <div class="footer">
        <img src="src/shop.webp">
        <img src="src/biglietti.webp" class="active">
        <img src="src/nome.webp" class="icon-profile">
    </div>

</body>
</html>
