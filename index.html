<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I miei biglietti</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        /* FIX LARGHEZZA E SCROLL */
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            overflow-x: hidden; 
            background-color: #ffffff;
        }

        .ticket-list { width: 100%; padding: 0; margin-top: 60px; }
        .ticket-link { text-decoration: none; display: block; width: 100%; }

        .ticket-item {
            position: relative;
            width: 100%;
            height: 100px;
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 16px;
            margin-bottom: 2px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* ANIMAZIONE TURBO */
        .turbo-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background-color: #a8e2d7;
            animation: arstTurboFill 1.8s infinite linear;
            z-index: 1;
        }

        /* ICONE A SINISTRA */
        .icons-stack {
            position: relative;
            z-index: 3;
            width: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .icon-checkmark {
            width: 24px;
            height: 24px;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .icon-bus-png { 
            width: 20px;
            height: auto;
            display: block;
            margin-top: 55px;
            margin-left: -10px;
        }

        /* CONTENUTO TESTUALE */
        .ticket-content {
            position: relative;
            z-index: 3;
            padding-left: 12px;
            margin-top: -10px;
            flex: 1;
        }

        .company-name { font-weight: 400; font-size: 15px; color: #8a8a8a; margin: 0; }
        .ticket-info { font-weight: 400; font-size: 15px; color: #222; margin: 0; line-height: 1.2; }

        .remaining-time {
            position: absolute;
            bottom: 10px; right: 16px; z-index: 4;
            font-size: 12px; color: #757575;
        }

        @keyframes arstTurboFill {
            0% { width: 0%; opacity: 1; }
            15% { width: 100%; opacity: 1; }
            25% { width: 100%; opacity: 1; }
            30% { width: 100%; opacity: 0; }
            100% { width: 0%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span>I miei biglietti</span>
        <img src="src/add.webp" alt="Shop" class="shop-icon-header">
        <span class="plus-icon"></span>
    </div>

    <div class="ticket-list">
        <a href="extraurbano1.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="icons-stack">
                    <svg class="icon-checkmark" viewBox="0 0 24 24">
                        <path fill="none" stroke="#a8e2d7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" d="M20 6L9 17l-5-5"></path>
                    </svg>
                    <img src="1000131418.webp" class="icon-bus-png">
                </div>
                <div class="ticket-content">
                    <div class="ticket-details">
                        <p class="company-name">ARST</p>
                        <p class="ticket-info">Abbonamento annuale studenti extraurbano</p>
                    </div>
                </div>
                <div class="remaining-time" data-end-date="2026-08-31T23:59:59"></div>
            </div>
        </a>

        <a href="extraurbano2.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="icons-stack">
                    <svg class="icon-checkmark" viewBox="0 0 24 24">
                        <path fill="none" stroke="#a8e2d7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" d="M20 6L9 17l-5-5"></path>
                    </svg>
                    <img src="1000131418.webp" class="icon-bus-png">
                </div>
                <div class="ticket-content">
                    <div class="ticket-details">
                        <p class="company-name">ARST</p>
                        <p class="ticket-info">Abbonamento annuale studenti extraurbano</p>
                    </div>
                </div>
                <div class="remaining-time" data-end-date="2026-08-31T23:59:59"></div>
            </div>
        </a>

        <a href="urbano.html" class="ticket-link">
            <div class="ticket-item">
                <div class="turbo-fill"></div>
                <div class="icons-stack">
                    <svg class="icon-checkmark" viewBox="0 0 24 24">
                        <path fill="none" stroke="#a8e2d7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" d="M20 6L9 17l-5-5"></path>
                    </svg>
                    <img src="1000131418.webp" class="icon-bus-png">
                </div>
                <div class="ticket-content">
                    <div class="ticket-details">
                        <p class="company-name">ARST</p>
                        <p class="ticket-info">Abbonamento annuale studenti urbano</p>
                    </div>
                </div>
                <div class="remaining-time" data-end-date="2026-08-31T23:59:59"></div>
            </div>
        </a>
    </div>

    <div class="footer">
        <a href="#" class="footer-item">
            <img src="src/shop.webp" alt="Shop" class="icon shop-icon">
        </a>
        <a href="#" class="footer-item active">
            <img src="src/biglietti.webp" alt="Biglietti" class="icon biglietti-icon">
        </a>
        <a href="#" class="footer-item">
            <img src="src/nome.webp" alt="Antonio Frau" class="icon nome-icon">
        </a>
    </div>

    <script>
        // Registrazione Service Worker per installazione PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        function updateRemainingTime() {
            const timeElements = document.querySelectorAll('.remaining-time');
            const now = new Date();
            timeElements.forEach(element => {
                const endDate = new Date(element.getAttribute('data-end-date'));
                const diff = endDate - now;
                if (diff <= 0) {
                    element.textContent = 'Scaduto!';
                    return;
                }
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                element.textContent = `${days} giorni ${hours} ore`;
            });
        }
        updateRemainingTime();
        setInterval(updateRemainingTime, 1000);
    </script>
</body>

</html>
