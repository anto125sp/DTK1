<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dettaglio Biglietto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a896">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #ffffff;
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* OVERLAY SEMITRASPARENTE */
        #refresh-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); 
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lottie-container {
            width: 70px; 
            height: 70px;
        }

        /* HEADER ORIGINALE */
        .ticket-header {
            background-color: #00a896;
            color: white;
            padding: 0 16px;
            display: flex;
            align-items: center;
            height: 62px;
        }
        .ticket-header h2 {
            font-size: 19px; 
            font-weight: 400; 
            margin: 0 0 0 18px;
            line-height: 1.1; 
            flex: 1;
        }

        /* PUNTINI EDIT */
        #edit-toggle {
            font-size: 26px; 
            font-weight: 500; 
            color: white; 
            margin-top: -5px; 
            margin-left: auto; 
            padding: 5px;
            cursor: pointer;
        }

        /* BANNER ANIMATO */
        .video-container {
            position: relative;
            width: 100%; height: 100px;
            background-color: #ffffff; overflow: hidden;
            display: flex; align-items: center; padding: 0 8px;
        }

        .video-emulator {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background-color: #a8e2d7;
            animation: arstTurboFill 1.8s infinite linear;
            z-index: 1;
        }

        .icons-stack {
            position: relative; z-index: 3; display: flex;
            flex-direction: column; align-items: center; justify-content: center; width: 32px;
        }

        .icon-checkmark {
            width: 30px; height: 30px; position: absolute;
            left: -4px; top: 50%; transform: translateY(-50%);
        }

        .icon-bus-svg { 
            width: 20px; height: auto; display: block;
            margin-top: 65px; margin-left: 25px;
        }

        .overlay-text {
            position: relative; z-index: 3; padding-left: 4px; margin-top: -45px;
        }
        .agency-name { font-weight: 400; font-size: 16px; color: #8a8a8a; margin: 0; }
        .ticket-type { font-weight: 400; font-size: 16px; color: #222; margin: 0; }
        
        .remaining-time-overlay {
            position: absolute; bottom: 10px; right: 16px; z-index: 4;
            font-size: 14px; color: #757575;
        }

        .details-list { padding: 0 16px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 0; border-bottom: 1.2px solid #b0b0b0;
        }
        .label { color: #9e9e9e; font-size: 17px; }
        .value { color: #222; font-size: 18px; text-align: right; flex: 1; margin-left: 20px; }

        @keyframes arstTurboFill {
            0% { width: 0%; opacity: 1; }
            15% { width: 100%; opacity: 1; }
            25% { width: 100%; opacity: 1; }
            30% { width: 100%; opacity: 0; }
            100% { width: 0%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="refresh-overlay">
        <div id="lottie-container"></div>
    </div>

    <header class="ticket-header">
        <a href="index.html" style="color:white; display:flex; align-items:center; text-decoration:none; padding: 10px; margin-left: -10px;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <h2>Abbonamento annuale studenti <br> extraurbano</h2>
        <span id="edit-toggle">&#8942;</span>
    </header>

    <div class="video-container">
        <div class="video-emulator"></div>
        <div class="icons-stack">
            <svg class="icon-checkmark" viewBox="0 0 24 24">
                <path fill="none" stroke="#a8e2d7" stroke-width="2" d="M20 6L9 17l-5-5"></path>
            </svg>
            <img src="1000131418.webp" class="icon-bus-svg" alt="Bus">
        </div>
        <div class="overlay-text">
            <p class="agency-name">ARST</p>
            <p class="ticket-type">Abbonamento annuale studenti extraurbano</p>
        </div>
        <div class="remaining-time-overlay">
            <span id="remaining-time"></span>
        </div>
    </div>

    <main class="ticket-body">
        <section style="text-align: center; padding: 25px 0;">
            <img src="src/qr.webp" style="width: 130px;" alt="QR">
            <p style="font-weight: 600; font-size: 20px; color: #757575; margin-top: 15px;">01/09/25 - 31/08/26</p>
        </section>

        <section class="details-list">
            <div class="detail-row"><span class="label">Codice</span><span class="value" id="t-code">T85136V9D</span></div>
            <div class="detail-row"><span class="label">Data di acquisto</span><span class="value" id="t-date">03/09/25</span></div>
            <div class="detail-row"><span class="label">Nome</span><span class="value" id="t-name">Antonio</span></div>
            <div class="detail-row"><span class="label">Cognome</span><span class="value" id="t-surname">Frau</span></div>
            <div class="detail-row"><span class="label">Tessera ARST</span><span class="value" id="t-card">5D9TRZ7</span></div>
            <div class="detail-row"><span class="label">Città</span><span class="value" id="t-city">SOLARUSSA - ORISTANO</span></div>
            <div class="detail-row"><span class="label">Convalida</span><span class="value">03 set, 12:37</span></div>
        </section>
    </main>

    <script>
        const ids = ['t-code', 't-date', 't-name', 't-surname', 't-card', 't-city'];

        // 1. CARICA I DATI SALVATI ALL'APERTURA
        function loadSavedData() {
            const saved = localStorage.getItem('ticket_data_storage');
            if (saved) {
                const data = JSON.parse(saved);
                ids.forEach(id => {
                    if (data[id]) document.getElementById(id).innerText = data[id];
                });
            }
        }

        // 2. SALVA I DATI NEL TELEFONO
        function saveCurrentData() {
            const data = {};
            ids.forEach(id => {
                data[id] = document.getElementById(id).innerText.trim();
            });
            localStorage.setItem('ticket_data_storage', JSON.stringify(data));
        }

        // Inizializzazione
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        const animation = lottie.loadAnimation({
            container: document.getElementById('lottie-container'),
            renderer: 'svg', loop: true, autoplay: true,
            path: 'refresh.json'
        });

        // Esegui caricamento appena il DOM è pronto
        document.addEventListener('DOMContentLoaded', loadSavedData);

        window.addEventListener('load', () => {
            setTimeout(() => {
                const overlay = document.getElementById('refresh-overlay');
                overlay.style.transition = 'opacity 0.2s ease';
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 200);
            }, 500);
        });

        function updateRemainingTime() {
            const diff = new Date('2026-08-31T23:59:59') - new Date();
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('remaining-time').textContent = `Rimanenti: ${days} giorni ${hours} ore`;
        }
        setInterval(updateRemainingTime, 1000);
        updateRemainingTime();

        const editToggle = document.getElementById('edit-toggle');
        let isEditing = false;

        editToggle.addEventListener('click', () => {
            isEditing = !isEditing;
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.contentEditable = isEditing;
                el.style.background = isEditing ? '#f5f5f5' : 'transparent';
                el.style.padding = isEditing ? '2px 5px' : '0';
            });

            if (!isEditing) {
                saveCurrentData(); // SALVA QUANDO PREMI LA SPUNTA
            }

            editToggle.innerHTML = isEditing ? '&#10003;' : '&#8942;';
        });
    </script>
</body>
</html>
